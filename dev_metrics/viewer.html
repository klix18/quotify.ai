<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quotify — Parse Metrics Viewer (Dev-Only)</title>
<style>
  :root {
    --blue: #0451BD;
    --bg: #f5f7fa;
    --card: #ffffff;
    --ink: #20272D;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent-bg: #E8EFF8;
    --danger: #b91c1c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px;
  }
  h1 { margin: 0 0 4px; color: var(--blue); font-size: 22px; }
  h2 { margin: 0 0 6px; font-size: 18px; color: var(--blue); }
  h3 { margin: 18px 0 8px; font-size: 14px; color: var(--ink); text-transform: uppercase; letter-spacing: 0.4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  .row { display: grid; grid-template-columns: 2fr 1fr auto auto; gap: 12px; align-items: end; }
  button {
    padding: 9px 14px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { filter: brightness(0.92); }
  button.secondary {
    background: white;
    color: var(--blue);
    border: 1px solid var(--blue);
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--blue); margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { background: var(--accent-bg); color: var(--blue); font-weight: 600; }
  tr:hover { background: #fafbfc; }
  .chip { display: inline-block; padding: 2px 8px; background: var(--accent-bg); color: var(--blue); border-radius: 10px; font-size: 11px; font-weight: 600; }
  .error {
    background: #fee2e2;
    color: var(--danger);
    padding: 10px 14px;
    border-radius: 6px;
    margin: 12px 0;
    font-size: 13px;
  }
  .ok { color: #059669; font-size: 12px; }
  details { margin-top: 4px; }
  summary { cursor: pointer; color: var(--blue); font-size: 11px; }
  .manual-list { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--muted); margin-top: 4px; padding-left: 20px; }
  .manual-list li { margin: 2px 0; }
  .design-tag { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .design-desc {
    width: 100%;
    min-height: 140px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    line-height: 1.55;
    resize: vertical;
    color: var(--ink);
    background: #fafbfc;
  }
  .design-header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 4px;
  }
  .design-meta { font-size: 12px; color: var(--muted); }
  .scroll { max-height: 540px; overflow: auto; border-radius: 6px; border: 1px solid var(--border); }
  .section-sep { height: 8px; }
  .badge-pill { display:inline-block; padding:2px 10px; border-radius:999px; background:var(--blue); color:white; font-size:11px; font-weight:700; letter-spacing:0.3px; }
  .empty { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<h1>Quotify — Parse Metrics Viewer</h1>
<div class="sub">
  Dev-only. Each <b>Design</b> below is a distinct <code>system_design</code> tag
  set in <code>frontend/src/devMetrics.js</code>. Change the tag to create a new design
  — new parses are tagged to the new design and stop polluting the old one, so you
  can compare orchestrations side-by-side.
</div>

<div class="card">
  <div class="row">
    <div>
      <label>Backend URL</label>
      <input type="text" id="backendUrl" placeholder="https://your-railway-app.up.railway.app" />
    </div>
    <div>
      <label>DEV_METRICS_API_KEY</label>
      <input type="password" id="apiKey" placeholder="Set DEV_METRICS_API_KEY on Railway" />
    </div>
    <button onclick="loadData()">Load</button>
    <button class="secondary" onclick="downloadJsonl()">Download JSONL</button>
  </div>
  <div id="status" style="margin-top: 10px;"></div>
</div>

<div id="results" style="display:none;">
  <div class="stats" id="globalStats"></div>
  <div id="designSections"></div>
</div>

<script>
/* =========================================================================
 * Quotify Parse Metrics Viewer — Design-partitioned layout.
 *
 * Layout:
 *   Design N — <tag>
 *     • description of the orchestration (editable, persisted to localStorage)
 *     • per-insurance-type summary table (sessions + avg latency + avg manual edits)
 *     • raw sessions table filtered to this design
 *
 * Sections are generated from DISTINCT system_design tags in the fetched
 * rows. "Design N" is assigned by first-seen chronological order — the
 * earliest tag is Design 1, the next new tag to appear is Design 2, etc.
 * Displayed newest-first so the current run is on top.
 * ========================================================================= */
const STATE = {
  rows: [],       // raw rows from API
  sessions: [],   // joined by parse_id
};

/* Default descriptions for known design tags. When a new tag shows up for
 * the first time the textarea is blank; you can type whatever you want and
 * it persists to localStorage keyed by the tag. */
const DEFAULT_DESCRIPTIONS = {
  "baseline-2026-04-20": [
    "3-pass Gemini pipeline with OpenAI fallback.",
    "",
    "Pass 0 (vision, gemini-2.5-flash-lite): detect carrier from page-1 logo,",
    "  load matching carrier patch from skills/<type>/<carrier>.md.",
    "Pass 1 (gemini-2.5-flash-lite): quick key:value streaming draft. Streams",
    "  draft_patch events so the UI populates within ~1-2s.",
    "Pass 2 (gemini-2.5-flash): strict JSON via response_schema — forces the",
    "  model to emit the full per-type schema with a 0-1 confidence per leaf.",
    "Pass 3 (gemini-2.5-flash): self-healing retry for fields with",
    "  confidence < 0.45 (max 8 fields). Non-fatal.",
    "",
    "Fallback chain per pass: flash-lite → flash → flash-2.0 → flash-1.5,",
    "then OpenAI GPT-4o-mini → GPT-4o if every Gemini fails.",
    "",
    "Skill layer: base skill + optional carrier patch + optional wind/hail",
    "or bundle_separate supplement.",
  ].join("\n"),
};

function getBackend() {
  let url = document.getElementById("backendUrl").value.trim();
  url = url.replace(/\/+$/, "");
  if (url && !/^https?:\/\//i.test(url)) {
    url = "https://" + url;
  }
  return url;
}
function getKey() { return document.getElementById("apiKey").value.trim(); }

function loadInputs() {
  const u = localStorage.getItem("qm.backendUrl") || "";
  const k = localStorage.getItem("qm.apiKey") || "";
  if (u) document.getElementById("backendUrl").value = u;
  if (k) document.getElementById("apiKey").value = k;
}
function saveInputs() {
  localStorage.setItem("qm.backendUrl", getBackend());
  localStorage.setItem("qm.apiKey", getKey());
}

async function loadData() {
  const backend = getBackend();
  const key = getKey();
  const status = document.getElementById("status");
  status.innerHTML = "";
  if (!backend) { status.innerHTML = '<div class="error">Please enter your Railway backend URL.</div>'; return; }
  if (!key)     { status.innerHTML = '<div class="error">Please enter the DEV_METRICS_API_KEY.</div>'; return; }
  saveInputs();
  status.innerHTML = '<span class="ok">Loading…</span>';
  try {
    const resp = await fetch(`${backend}/api/dev-metrics/data`, {
      headers: { "X-Dev-Metrics-Key": key },
      mode: "cors",
    });
    if (!resp.ok) {
      const body = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${body.slice(0, 200)}`);
    }
    const data = await resp.json();
    STATE.rows = data.rows || [];
    joinSessions();
    status.innerHTML = `<span class="ok">Loaded ${STATE.rows.length} row(s) / ${STATE.sessions.length} session(s).</span>`;
    document.getElementById("results").style.display = "block";
    render();
  } catch (err) {
    const msg = String(err?.message || err);
    let hint = "";
    if (/Failed to fetch|NetworkError|Load failed/i.test(msg)) {
      hint = [
        "",
        "Likely causes (open DevTools → Network tab for the real reason):",
        "  • CORS — viewer is at file://, backend only allows listed origins.",
        "    Fix: serve this file via  python -m http.server 8080  then",
        "    add http://localhost:8080 to allow_origins in backend/main.py.",
        "  • Cloudflare blocking the OPTIONS preflight or the GET.",
        "  • Wrong URL / typo — double-check the Backend URL field.",
      ].join("\n");
    }
    status.innerHTML =
      `<div class="error">${escapeHtml(msg)}${hint ? "<pre>" + escapeHtml(hint) + "</pre>" : ""}</div>`;
  }
}

/* Join parse + quote rows into sessions keyed by parse_id. */
function joinSessions() {
  const bucket = new Map();
  for (const r of STATE.rows) {
    const key = r.parse_id;
    if (!bucket.has(key)) bucket.set(key, { parse_id: key });
    const s = bucket.get(key);
    if (r.event === "parse") {
      s.parse_timestamp = r.timestamp;
      s.insurance_type = r.insurance_type;
      s.pdf_count = r.pdf_count;
      s.latency_ms = r.latency_ms;
      s.system_design = r.system_design;
    } else if (r.event === "quote") {
      s.quote_timestamp = r.timestamp;
      s.manual_changes_all_count = r.manual_changes_all_count;
      s.manual_changes_non_client_count = r.manual_changes_non_client_count;
      s.manual_changes = r.manual_changes || [];
      if (!s.insurance_type) s.insurance_type = r.insurance_type;
      if (!s.system_design) s.system_design = r.system_design;
    }
  }
  STATE.sessions = Array.from(bucket.values())
    .sort((a, b) => (b.parse_timestamp || b.quote_timestamp || "")
      .localeCompare(a.parse_timestamp || a.quote_timestamp || ""));
}

/* -------------------------------------------------------------------------
 * Rendering
 * ------------------------------------------------------------------------- */

function render() {
  renderGlobalStats();
  renderDesignSections();
}

function renderGlobalStats() {
  const rows = STATE.sessions;
  const el = document.getElementById("globalStats");
  const designs = new Set(rows.map(r => r.system_design).filter(Boolean));
  const withLatency = rows.filter(r => typeof r.latency_ms === "number");
  const avgLatency = withLatency.length
    ? Math.round(withLatency.reduce((a, b) => a + b.latency_ms, 0) / withLatency.length)
    : 0;
  const withQuote = rows.filter(r => typeof r.manual_changes_all_count === "number");
  el.innerHTML = `
    <div class="stat"><div class="stat-label">Designs</div><div class="stat-value">${designs.size}</div></div>
    <div class="stat"><div class="stat-label">Sessions (all)</div><div class="stat-value">${rows.length}</div></div>
    <div class="stat"><div class="stat-label">With quote</div><div class="stat-value">${withQuote.length}</div></div>
    <div class="stat"><div class="stat-label">Avg latency (all)</div><div class="stat-value">${avgLatency ? fmtSec(avgLatency) : "—"} s</div></div>
  `;
}

/* Build design sections. Ordinal "Design N" is assigned by first-seen
 * chronology (earliest timestamp first = Design 1). Display order is
 * reverse-chronological so the most recent design is on top. */
function renderDesignSections() {
  const container = document.getElementById("designSections");

  if (!STATE.sessions.length) {
    container.innerHTML = `<div class="card empty">No sessions yet. Do a parse in the app and reload.</div>`;
    return;
  }

  // Bucket sessions by system_design (empty tag becomes "(untagged)")
  const buckets = new Map();
  for (const s of STATE.sessions) {
    const tag = s.system_design || "(untagged)";
    if (!buckets.has(tag)) buckets.set(tag, []);
    buckets.get(tag).push(s);
  }

  // Compute first-seen timestamp per tag (for Design N ordinal)
  const firstSeen = new Map();
  for (const [tag, arr] of buckets) {
    const min = arr.reduce((acc, s) => {
      const t = s.parse_timestamp || s.quote_timestamp || "";
      if (!acc || (t && t < acc)) return t || acc;
      return acc;
    }, null);
    firstSeen.set(tag, min || "");
  }

  // Ordinal by chronology: oldest first
  const chronoTags = Array.from(buckets.keys())
    .sort((a, b) => (firstSeen.get(a) || "").localeCompare(firstSeen.get(b) || ""));
  const ordinal = new Map();
  chronoTags.forEach((tag, i) => ordinal.set(tag, i + 1));

  // Display newest first
  const displayTags = [...chronoTags].reverse();

  container.innerHTML = displayTags.map(tag => {
    const ordN = ordinal.get(tag);
    const sessions = buckets.get(tag);
    const first = firstSeen.get(tag);
    const last = sessions.reduce((acc, s) => {
      const t = s.parse_timestamp || s.quote_timestamp || "";
      return (!acc || t > acc) ? t : acc;
    }, "");
    return `
      <div class="card">
        <div class="design-header">
          <div>
            <h2><span class="badge-pill">DESIGN ${ordN}</span> &nbsp; ${escapeHtml(tag)}</h2>
            <div class="design-meta">
              ${sessions.length} session${sessions.length === 1 ? "" : "s"}
              · first seen ${escapeHtml(fmtDate(first))}
              · latest ${escapeHtml(fmtDate(last))}
            </div>
          </div>
        </div>

        <h3>Orchestration flow</h3>
        <textarea
          class="design-desc"
          data-tag="${escapeHtml(tag)}"
          oninput="saveDesc(this)"
          placeholder="Describe the LLM orchestration used for this design (models, passes, fallbacks, skills)…"
        >${escapeHtml(getDesc(tag))}</textarea>

        <h3>Average latency by insurance type</h3>
        ${renderTypeSummary(sessions)}

        <h3>Captured data</h3>
        <div class="scroll">
          ${renderSessionsTable(sessions)}
        </div>
      </div>
      <div class="section-sep"></div>
    `;
  }).join("");
}

function renderTypeSummary(sessions) {
  const byType = new Map();
  for (const s of sessions) {
    const t = s.insurance_type || "(unknown)";
    if (!byType.has(t)) byType.set(t, []);
    byType.get(t).push(s);
  }
  const rows = [...byType.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  if (!rows.length) return `<div class="empty">No sessions.</div>`;
  return `
    <table>
      <thead>
        <tr>
          <th>Insurance type</th>
          <th>Sessions</th>
          <th>Avg latency (s)</th>
          <th>p50 latency (s)</th>
          <th>p95 latency (s)</th>
          <th>Avg manual (all)</th>
          <th>Avg manual (non-client)</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(([type, arr]) => {
          const lats = arr.map(s => s.latency_ms).filter(v => typeof v === "number");
          const avgLat = lats.length ? Math.round(lats.reduce((a,b)=>a+b,0)/lats.length) : null;
          const p50 = percentile(lats, 50);
          const p95 = percentile(lats, 95);
          const quotes = arr.filter(s => typeof s.manual_changes_all_count === "number");
          const avgAll = quotes.length
            ? (quotes.reduce((a,b)=>a+b.manual_changes_all_count,0)/quotes.length).toFixed(1)
            : "—";
          const avgNon = quotes.length
            ? (quotes.reduce((a,b)=>a+b.manual_changes_non_client_count,0)/quotes.length).toFixed(1)
            : "—";
          return `<tr>
            <td><span class="chip">${escapeHtml(type)}</span></td>
            <td>${arr.length}</td>
            <td>${avgLat != null ? fmtSec(avgLat) : "—"}</td>
            <td>${p50 ? fmtSec(p50) : "—"}</td>
            <td>${p95 ? fmtSec(p95) : "—"}</td>
            <td>${avgAll}</td>
            <td>${avgNon}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
}

function renderSessionsTable(sessions) {
  if (!sessions.length) return `<div class="empty">No sessions.</div>`;
  return `
    <table>
      <thead>
        <tr>
          <th>Parsed at</th>
          <th>Type</th>
          <th>PDFs</th>
          <th>Latency (s)</th>
          <th># Manual (all)</th>
          <th># Manual (non-client)</th>
          <th>Manual changes</th>
        </tr>
      </thead>
      <tbody>
        ${sessions.map(r => {
          const ts = r.parse_timestamp || r.quote_timestamp || "";
          const manual = Array.isArray(r.manual_changes) && r.manual_changes.length
            ? `<details><summary>${r.manual_changes.length} change(s)</summary>
               <ul class="manual-list">${r.manual_changes.map(m =>
                 `<li><b>${escapeHtml(m.field || "")}</b> → ${escapeHtml(String(m.value ?? ""))}</li>`).join("")}</ul></details>`
            : "—";
          return `<tr>
            <td>${escapeHtml(fmtDate(ts))}</td>
            <td><span class="chip">${escapeHtml(r.insurance_type || "?")}</span></td>
            <td>${r.pdf_count ?? "—"}</td>
            <td>${r.latency_ms != null ? fmtSec(r.latency_ms) : "—"}</td>
            <td>${r.manual_changes_all_count ?? "—"}</td>
            <td>${r.manual_changes_non_client_count ?? "—"}</td>
            <td>${manual}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
}

/* -------------------------------------------------------------------------
 * Description storage (per design tag, persisted in localStorage)
 * ------------------------------------------------------------------------- */
function descKey(tag) { return "qm.desc." + tag; }
function getDesc(tag) {
  const stored = localStorage.getItem(descKey(tag));
  if (stored !== null) return stored;
  return DEFAULT_DESCRIPTIONS[tag] || "";
}
function saveDesc(el) {
  const tag = el.getAttribute("data-tag");
  if (!tag) return;
  localStorage.setItem(descKey(tag), el.value);
}

/* -------------------------------------------------------------------------
 * Utilities
 * ------------------------------------------------------------------------- */
function percentile(arr, p) {
  if (!arr || !arr.length) return 0;
  const sorted = [...arr].sort((a, b) => a - b);
  const idx = Math.min(sorted.length - 1, Math.floor((p / 100) * sorted.length));
  return Math.round(sorted[idx]);
}

/* Format a latency value (milliseconds) as seconds with 2 decimal places,
 * thousands-separated. 32947 → "32.95", 1234567 → "1,234.57". */
function fmtSec(ms) {
  if (ms == null || isNaN(ms)) return "—";
  const secs = Number(ms) / 1000;
  return secs.toLocaleString(undefined, {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });
}

function fmtDate(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString();
  } catch (_) {
    return iso;
  }
}

function downloadJsonl() {
  if (!STATE.rows.length) { alert("Load data first."); return; }
  const lines = STATE.rows.map(r => JSON.stringify(r)).join("\n");
  const blob = new Blob([lines + "\n"], { type: "application/x-ndjson" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `parse_metrics_${new Date().toISOString().slice(0, 10)}.jsonl`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

loadInputs();
</script>
</body>
</html>
